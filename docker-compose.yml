version: '3.8'

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data:

services:

  db:
    image: mysql:8.0
    container_name: sakila-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - sakila-db-data:/var/lib/mysql
      - ./sakila-db/sakila-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sakila-db/sakila-data.sql:/docker-entrypoint-initdb.d/02-data.sql
    networks:
      - sakila-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build: .
    container_name: sakila-app
    restart: on-failure:5
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network

  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - sakila-network

  test-runner:
    build: .
    container_name: sakila-tests
    command: python -m pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network
    profiles:
      - test
